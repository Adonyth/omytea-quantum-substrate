name: ci

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: pytest Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12', '3.13']
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install (editable) + dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'

      - name: Verify pure-stdlib import surface
        run: |
          python -c "import omytea; print('omytea version:', omytea.__version__)"
          python -c "from omytea import StateHypothesis, WaveFunction, JointWaveFunction, OffDiagonalEntry, DensityMatrix, Position"
          python -c "from omytea.dynamics import LindbladOperator, OperatorContext"

      - name: Run tests
        run: pytest -q

  build:
    name: Build sdist + wheel
    runs-on: ubuntu-latest
    needs: test
    # Run on pushes to main AND on tag pushes (so publish job has artefacts)
    if: >
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Build sdist + wheel
        run: python -m build

      - name: Verify build artefacts
        run: |
          ls -lh dist/
          test -f dist/omytea_quantum_substrate-*.tar.gz
          test -f dist/omytea_quantum_substrate-*-py3-none-any.whl

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 14

  publish:
    name: Publish to PyPI (on tag)
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    environment:
      name: pypi
      url: https://pypi.org/project/omytea-quantum-substrate/
    permissions:
      # Required for PyPI Trusted Publishing (OIDC).
      # No API tokens. PyPI verifies the workflow + tag via GitHub's
      # OIDC token before accepting the upload.
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Build sdist + wheel
        run: python -m build

      - name: Publish to PyPI via Trusted Publishing
        uses: pypa/gh-action-pypi-publish@release/v1
